# 🌟 Đã sửa: Vô hiệu hóa dòng config import gây lỗi nạp biến môi trường đè từ .env cục bộ
# spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8080}
spring.application.name=products

# ================== MySQL & Connection Pool (HikariCP) ==================
# ĐÃ TỐI ƯU: Sử dụng biến môi trường (Environment Variables) để giấu mật khẩu, nếu không có sẽ tự lấy giá trị mặc định sau dấu hai chấm (:)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CẤU HÌNH PHÒNG VỆ DB: Chống treo Connection Pool khi hệ thống quá tải
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ================== JPA / Hibernate ==================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_batch_fetch_size=25

# 🌟 Đã xóa: Bỏ dòng cấu hình cứng Dialect cũ để Hibernate tự động nhận diện tối ưu và không báo WARN lúc khởi động
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 🌟 Đã thêm: Tắt tính năng Open-In-View để tiết kiệm kết nối cơ sở dữ liệu và tắt cảnh báo lúc khởi động
spring.jpa.open-in-view=false

# Quản lý Log SQL chuyên nghiệp qua Logback (Giữ nguyên cấu hình xuất sắc của bạn)
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.properties.hibernate.format_sql=true

# ================== Virtual Threads (Java 21) ==================
spring.threads.virtual.enabled=true

# ================== Actuator & Observability ==================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

# ================== Mail Service ==================
# ĐÃ BẢO MẬT: Giấu mật khẩu ứng dụng của Gmail bằng biến môi trường MAIL_PASSWORD
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================== Other Config ==================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.web.resources.static-locations=classpath:/static/
spring.main.banner-mode=off
spring.h2.console.enabled=false
# Hiển thị chi tiết lỗi Exception ra màn hình/log để dễ dàng sửa chữa
server.error.include-message=always
server.error.include-stacktrace=always